<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Spending Record</title>
    <link rel="stylesheet" href="../css/tabela.css">
</head>
<body>
   <h1>My spending record</h1>
<!-- A tabela abaixo é um exemplo de como organizar informações em formato tabular usando a tag <table>. -->
<table>
  <!-- <caption> é usada para fornecer um título ou descrição para a tabela. -->
  <caption>
    How I chose to spend my money
  </caption>
  <!-- <tr> é usada para definir uma linha na tabela. -->
  <tr>
    <!-- <th> é usada para definir um cabeçalho de coluna, enquanto <td> é usada para definir uma célula de dados. -->
    <th>Purchase</th>
    <th>Location</th>
    <th>Date</th>
    <th>Evaluation</th>
    <th>Cost (€)</th>
  </tr>
  <tr>
    <td>Haircut</td>
    <td>Hairdresser</td>
    <td>12/09</td>
    <td>Great idea</td>
    <td>30</td>
  </tr>
  <tr>
    <td>Lasagna</td>
    <td>Restaurant</td>
    <td>12/09</td>
    <td>Regrets</td>
    <td>18</td>
  </tr>
  <tr>
    <td>Shoes</td>
    <td>Shoe shop</td>
    <td>13/09</td>
    <td>Big regrets</td>
    <td>65</td>
  </tr>
  <tr>
    <td>Toothpaste</td>
    <td>Supermarket</td>
    <td>13/09</td>
    <td>Good</td>
    <td>5</td>
  </tr>
  <tr>
    <td>SUM</td>
    <td>118</td>
  </tr>
</table>
    
</body>
</html>
