<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicas</title>
</head>
<body>

    <!-- input é para criar um campo de texto, ou seja, para permitir que o usuário digite algo -->
     <input type="text">
    <!-- disabled é para desabilitar o campo de texto, ou seja, para impedir que o usuário digite algo -->
     <input type="text" disabled>

     <!--caracteres especiais:
     &lt; para <   
     &gt; para >
     &amp; para &
     &quot; para "
     &apos; para '
      -->
</body>
</html>
